<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Resultado do Cálculo - UCALC/PCS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h2>Resultado do Cálculo</h2>

    <div class="row mb-3">
        <div class="col-md-6">
            <p><strong>Autor:</strong> <span th:text="${calculo.processo.autor}"></span></p>
            <p><strong>Réu:</strong> <span th:text="${calculo.processo.reu}"></span></p>
            <p><strong>Autos:</strong> <span th:text="${calculo.processo.autos}"></span></p>
        </div>
        <div class="col-md-6">
            <p><strong>Comarca:</strong> <span th:text="${calculo.processo.comarca}"></span></p>
            <p><strong>Vara:</strong> <span th:text="${calculo.processo.vara}"></span></p>
            <p><strong>PGENET:</strong> <span th:text="${calculo.processo.pgenet}"></span></p>
        </div>
    </div>

    <table class="table table-bordered table-sm">
        <thead class="table-light">
        <tr>
            <th>Data</th>
            <th>Valor devido</th>
            <th>Fator de correção</th>
            <th>Valor atualizado</th>
            <th>Taxa de juros</th>
            <th>Valor dos juros</th>
            <th>Total</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="item : ${calculo.itens}">
            <td th:text="${#temporals.format(item.data, 'MM/yyyy')}"></td>
            <td th:text="${#numbers.formatDecimal(item.valorDevido, 1, 2)}"></td>
            <td th:text="${#numbers.formatDecimal(item.indiceCorrecao, 1, 6)}"></td>
            <td th:text="${#numbers.formatDecimal(item.valorAtualizado, 1, 2)}"></td>
            <td th:text="${#numbers.formatDecimal(item.indiceJuros, 1, 6)}"></td>
            <td th:text="${#numbers.formatDecimal(item.valorJuros, 1, 2)}"></td>
            <td th:text="${#numbers.formatDecimal(item.total, 1, 2)}"></td>
        </tr>
        </tbody>
    </table>

    <a th:href="@{/calculo/novo}" class="btn btn-secondary">Novo cálculo</a>
</div>
</body>
</html>
