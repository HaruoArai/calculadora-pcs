<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo Cálculo - PCS/UCALC</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
    <link th:href="@{/css/form.css}" rel="stylesheet">
</head>
<body>

<header class="cabecalho-sistema">
    <div class="logo-container">
        <img th:src="@{/img/logo-pge.png}" alt="Logo PGE-MS" class="logo-sistema">
    </div>
    <div class="titulo-container">
        <h1>Calculadora Judicial - PCS/UCALC</h1>
        <div class="subtitulo">Procuradoria Geral do Estado de Mato Grosso do Sul</div>
    </div>
</header>

<div class="container mt-4">

    <form th:action="@{/calculo/calcular}" th:object="${form}" method="post" id="form-calculo" novalidate>

        <!-- ================= DADOS DO PROCESSO ================= -->
        <div class="card-secao">
            <h5>
                <svg class="icone-secao" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                    <path d="M14 2v6h6"/>
                    <line x1="9" y1="13" x2="15" y2="13"/>
                    <line x1="9" y1="17" x2="15" y2="17"/>
                </svg>
                Dados do Processo
            </h5>

            <div class="grid grid-2">
                <div class="campo">
                    <label class="form-label">Autor</label>
                    <input type="text" class="form-control" th:field="*{autor}" placeholder="Nome do autor">
                    <span class="text-danger" th:if="${#fields.hasErrors('autor')}" th:errors="*{autor}"></span>
                </div>
                <div class="campo">
                    <label class="form-label">Réu</label>
                    <input type="text" class="form-control" th:field="*{reu}" placeholder="Nome do réu">
                    <span class="text-danger" th:if="${#fields.hasErrors('reu')}" th:errors="*{reu}"></span>
                </div>
            </div>

            <div class="grid grid-4">
                <div class="campo">
                    <label class="form-label">Autos</label>
                    <input type="text" class="form-control" th:field="*{autos}" placeholder="0000000-00.0000.0.00.0000">
                </div>
                <div class="campo">
                    <label class="form-label">Comarca</label>
                    <input type="text" class="form-control" th:field="*{comarca}">
                </div>
                <div class="campo">
                    <label class="form-label">Vara</label>
                    <input type="text" class="form-control" th:field="*{vara}">
                </div>
                <div class="campo">
                    <label class="form-label">PGENET</label>
                    <input type="text" class="form-control" th:field="*{pgenet}">
                </div>
            </div>
        </div>

        <!-- ================= DADOS DO CÁLCULO =================
        <div class="card-secao">
            <h5>
                <svg class="icone-secao" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="4" y="2" width="16" height="20" rx="2"/>
                    <line x1="8" y1="7" x2="16" y2="7"/>
                    <line x1="8" y1="11" x2="10" y2="11"/>
                    <line x1="14" y1="11" x2="16" y2="11"/>
                    <line x1="8" y1="15" x2="10" y2="15"/>
                    <line x1="14" y1="15" x2="16" y2="15"/>
                </svg>
                Dados do Cálculo
            </h5>

            <div class="grid grid-3">
                <div class="campo">
                    <label class="form-label">Competência inicial</label>
                    <input type="text" class="form-control mask-data" placeholder="dd/mm/aaaa"
                           th:field="*{competenciaInicial}" inputmode="numeric" maxlength="10">
                    <span class="text-danger" th:if="${#fields.hasErrors('competenciaInicial')}" th:errors="*{competenciaInicial}"></span>
                </div>
                <div class="campo">
                    <label class="form-label">Competência final</label>
                    <input type="text" class="form-control mask-data" placeholder="dd/mm/aaaa"
                           th:field="*{competenciaFinal}" inputmode="numeric" maxlength="10">
                    <span class="text-danger" th:if="${#fields.hasErrors('competenciaFinal')}" th:errors="*{competenciaFinal}"></span>
                </div>
                <div class="campo">
                    <label class="form-label">Valor devido (R$)</label>
                    <div class="input-prefixo">
                        <span>R$</span>
                        <input type="text" class="form-control mask-moeda" placeholder="0,00"
                               th:field="*{valorDevidoInicial}" inputmode="decimal">
                    </div>
                    <span class="text-danger" th:if="${#fields.hasErrors('valorDevidoInicial')}" th:errors="*{valorDevidoInicial}"></span>
                </div>
            </div>

            <div class="grid grid-2">
                <div class="campo">
                    <label class="form-label">Correção monetária</label>
                    <select class="form-select" th:field="*{tipoCorrecao}">
                        <option value="">Selecione</option>
                        <option th:each="tipo : ${tiposCorrecao}" th:value="${tipo}" th:text="${tipo.descricao}"></option>
                    </select>
                    <span class="text-danger" th:if="${#fields.hasErrors('tipoCorrecao')}" th:errors="*{tipoCorrecao}"></span>
                </div>
                <div class="campo">
                    <label class="form-label">Juros de mora</label>
                    <select class="form-select" th:field="*{tipoJuros}">
                        <option value="">Selecione</option>
                        <option th:each="tipo : ${tiposJuros}" th:value="${tipo}" th:text="${tipo.descricao}"></option>
                    </select>
                    <span class="text-danger" th:if="${#fields.hasErrors('tipoJuros')}" th:errors="*{tipoJuros}"></span>
                </div>
            </div>
        </div>
        -->

        <!-- ================= CORREÇÃO MONETÁRIA E JUROS ================= -->
        <div class="card-secao">
            <h5>
                <svg class="icone-secao" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="3 17 9 11 13 15 21 6"/>
                    <polyline points="15 6 21 6 21 12"/>
                </svg>
                Correção Monetária
            </h5>

            <div class="grid grid-2">

                <div class="campo">
                    <label class="form-label">
                        Tipo de Correção Monetária
                    </label>

                    <select class="form-select"
                            th:field="*{tipoCorrecao}">
                        <option value="">Selecione</option>
                        <option th:each="tipo : ${tiposCorrecao}"
                                th:value="${tipo}"
                                th:text="${tipo.descricao}">
                        </option>
                    </select>
                </div>

                <div class="campo">
                    <label class="form-label">
                        Data Final da Atualização
                    </label>
                    <input type="text"
                           class="form-control mask-data"
                           placeholder="dd/mm/aaaa"
                           th:field="*{dataAtualizacao}">
                </div>
            </div>

            <div class="campo mt-4">

                <label class="form-label fw-semibold">
                    Regra Constitucional Aplicável
                </label>

                <div class="opcoes-emenda">

                    <label class="opcao-chip">
                        <input type="radio"
                               th:field="*{tipoEmenda}"
                               value="NENHUMA">
                        <span>Nenhuma</span>
                    </label>

                    <label class="opcao-chip">
                        <input type="radio"
                               th:field="*{tipoEmenda}"
                               value="EC113">
                        <span>SELIC a partir de 12/2021 (EC 113/2021)</span>
                    </label>

                    <label class="opcao-chip">
                        <input type="radio"
                               th:field="*{tipoEmenda}"
                               value="EC136">
                        <span>IPCA + 2% a.a. a partir de 09/2025 (EC 136/2025)</span>
                    </label>

                </div>
            </div>

        </div>

        <div class="card-secao">
            <h5>
                <svg class="icone-secao" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="13" r="8"/>
                    <polyline points="12 9 12 13 15 15"/>
                    <path d="M9 2h6"/>
                </svg>
                Juros de Mora
            </h5>

            <div class="grid grid-2">

                <div class="campo">
                    <label class="form-label">
                        Tipo de Juros
                    </label>

                    <select class="form-select"
                            th:field="*{tipoJuros}">
                        <option value="">Selecione</option>
                        <option th:each="tipo : ${tiposJuros}"
                                th:value="${tipo}"
                                th:text="${tipo.descricao}">
                        </option>
                    </select>
                </div>

                <div class="campo">
                    <label class="form-label">
                        Data da Citação
                    </label>
                    <input type="text"
                           class="form-control mask-data"
                           placeholder="dd/mm/aaaa"
                           th:field="*{dataCitacao}">
                </div>
            </div>
        </div>

        <!-- ================= DADOS DAS PARCELAS ================= -->
        <div class="card-secao">

            <h5>
                <svg class="icone-secao" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="12" y1="1" x2="12" y2="23"/>
                    <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
                </svg>
                Dados da Parcela
            </h5>

            <div class="grid grid-2">

                <div class="campo">
                    <label class="form-label">
                        Data da Parcela
                    </label>

                    <input
                            type="text"
                            class="form-control mask-data"
                            placeholder="dd/mm/aaaa"
                            th:field="*{dataParcela}">
                </div>

                <div class="campo">
                    <label class="form-label">
                        Valor da Parcela (R$)
                    </label>

                    <div class="input-prefixo">
                        <span>R$</span>
                        <input
                                type="text"
                                class="form-control mask-moeda"
                                th:field="*{valorDevidoInicial}">
                    </div>
                </div>

            </div>
        </div>


                    <!-- ================= AÇÕES ================= -->
        <div class="barra-acoes">
            <button type="submit" class="btn btn-destaque" id="btn-calcular">
                <span class="btn-texto">Calcular</span>
                <span class="spinner" hidden></span>
            </button>
        </div>

    </form>
</div>

<footer class="rodape-sistema">
    <span>© 2026 Sistema de Cálculos Judiciais • PGE-MS • PCS • UCALC</span>
</footer>

<script th:src="@{/js/form.js}"></script>
</body>
</html>
