<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo Cálculo - PCS/UCALC</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
    <link th:href="@{/css/form.css}" rel="stylesheet">
</head>
<body>

<header class="cabecalho-sistema">
    <div class="logo-container">
        <img th:src="@{/img/logo-pge.png}" alt="Logo PGE-MS" class="logo-sistema">
    </div>
    <div class="titulo-container">
        <h1>Calculadora Judicial - PCS/UCALC</h1>
        <div class="subtitulo">Procuradoria Geral do Estado de Mato Grosso do Sul</div>
    </div>
</header>

<div class="container mt-4">

    <form th:action="@{/calculo/calcular}" th:object="${form}" method="post" id="form-calculo" novalidate>

        <!-- ================= DADOS DO PROCESSO ================= -->
        <div class="card-secao">
            <h5>
                <svg class="icone-secao" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                    <path d="M14 2v6h6"/>
                    <line x1="9" y1="13" x2="15" y2="13"/>
                    <line x1="9" y1="17" x2="15" y2="17"/>
                </svg>
                Dados do Processo
            </h5>

            <div class="grid grid-2">
                <div class="campo">
                    <label class="form-label">Autor</label>
                    <input type="text" class="form-control" th:field="*{autor}" placeholder="Nome do autor">
                    <span class="text-danger" th:if="${#fields.hasErrors('autor')}" th:errors="*{autor}"></span>
                </div>
                <div class="campo">
                    <label class="form-label">Réu</label>
                    <input type="text" class="form-control" th:field="*{reu}" placeholder="Nome do réu">
                    <span class="text-danger" th:if="${#fields.hasErrors('reu')}" th:errors="*{reu}"></span>
                </div>
            </div>

            <div class="grid grid-4">
                <div class="campo">
                    <label class="form-label">Autos</label>
                    <input type="text" class="form-control" th:field="*{autos}" placeholder="0000000-00.0000.0.00.0000">
                </div>
                <div class="campo">
                    <label class="form-label">Comarca</label>
                    <input type="text" class="form-control" th:field="*{comarca}">
                </div>
                <div class="campo">
                    <label class="form-label">Vara</label>
                    <input type="text" class="form-control" th:field="*{vara}">
                </div>
                <div class="campo">
                    <label class="form-label">PGENET</label>
                    <input type="text" class="form-control" th:field="*{pgenet}">
                </div>
            </div>
        </div>

        <!-- ================= CORREÇÃO MONETÁRIA E JUROS ================= -->
        <div class="card-secao">
            <h5>
                <svg class="icone-secao" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="3 17 9 11 13 15 21 6"/>
                    <polyline points="15 6 21 6 21 12"/>
                </svg>
                Correção Monetária
            </h5>

            <div class="grid grid-2">

                <div class="campo">
                    <label class="form-label">
                        Tipo de Correção Monetária
                    </label>

                    <select class="form-select"
                            th:field="*{tipoCorrecao}"
                            id="tipoCorrecao">
                        <option value="">Selecione</option>
                        <option th:each="tipo : ${tiposCorrecao}"
                                th:value="${tipo}"
                                th:text="${tipo.descricao}">
                        </option>
                    </select>

                    <span class="text-danger"
                          th:if="${#fields.hasErrors('tipoCorrecao')}"
                          th:errors="*{tipoCorrecao}">
                    </span>
                </div>

                <div class="campo">
                    <label class="form-label">
                        Data Final da Atualização
                    </label>
                    <input type="text"
                           class="form-control mask-data"
                           placeholder="dd/mm/aaaa"
                           th:field="*{dataAtualizacao}">

                    <span class="text-danger"
                          th:if="${#fields.hasErrors('dataAtualizacao')}"
                          th:errors="*{dataAtualizacao}">
                    </span>
                </div>
            </div>

            <div class="campo mt-4">

                <label class="form-label fw-semibold">
                    Regra Constitucional Aplicável
                    <span
                        class="ms-1 icone-info"
                        data-bs-toggle="tooltip"
                        data-bs-html="true"
                        data-bs-placement="right"
                        title="<b>EC 113/2021</b><br>• Aplica Taxa Selic de 09/12/2021 até a data final.<br><br><b>EC 136/2025</b><br>• Aplica Taxa Selic de 09/12/2021 até 09/09/2025.<br>• A partir de 10/09/2025 aplica IPCA + 2% ao ano até a data final.">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                            <circle cx="12" cy="12" r="10"/>
                            <line x1="12" y1="8" x2="12" y2="8" stroke-width="3"/>
                            <line x1="12" y1="12" x2="12" y2="17"/>
                        </svg>
                    </span>
                </label>

                <div class="opcoes-emenda">

                    <label class="opcao-chip">
                        <input type="radio"
                               th:field="*{tipoEmenda}"
                               id="emendaNenhuma"
                               value="NENHUMA">
                        <span>Nenhuma</span>
                    </label>

                    <label class="opcao-chip">
                        <input type="radio"
                               th:field="*{tipoEmenda}"
                               id="emendaEc113"
                               value="EC113">
                        <span>EC 113/2021</span>
                    </label>

                    <label class="opcao-chip">
                        <input type="radio"
                               th:field="*{tipoEmenda}"
                               id="emendaEc136"
                               value="EC136">
                        <span>EC 136/2025</span>
                    </label>

                </div>
            </div>

        </div>

        <div class="card-secao">
            <h5>
                <svg class="icone-secao" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="13" r="8"/>
                    <polyline points="12 9 12 13 15 15"/>
                    <path d="M9 2h6"/>
                </svg>
                Juros de Mora
            </h5>

            <div class="grid grid-2">

                <div class="campo">
                    <label class="form-label">
                        Tipo de Juros
                    </label>

                    <select class="form-select"
                            th:field="*{tipoJuros}"
                            id="tipoJuros">
                        <option value="">Selecione</option>
                        <option th:each="tipo : ${tiposJuros}"
                                th:value="${tipo}"
                                th:text="${tipo.descricao}">
                        </option>
                    </select>
                    <span class="text-danger"
                          th:if="${#fields.hasErrors('tipoJuros')}"
                          th:errors="*{tipoJuros}">
                    </span>
                </div>

                <div class="campo">
                    <label class="form-label">
                        Data da Citação
                    </label>
                    <input type="text"
                           class="form-control mask-data"
                           id="dataCitacao"
                           placeholder="dd/mm/aaaa"
                           th:field="*{dataCitacao}">

                    <span class="text-danger"
                          th:if="${#fields.hasErrors('dataCitacao')}"
                          th:errors="*{dataCitacao}">
                    </span>
                </div>
            </div>

            <div class="campo mt-4" id="blocoRegraJuros">

                <label class="form-label fw-semibold">
                    Forma de Aplicação dos Juros
                    <span
                        class="ms-1 icone-info"
                        data-bs-toggle="tooltip"
                        data-bs-html="true"
                        data-bs-placement="right"
                        title="<b>Período variável</b><br>O período dos juros acompanha a data de cada parcela. Para parcelas posteriores à citação, o período de juros diminui.<br><br><b>Período fixo</b><br>O período dos juros é sempre contado desde a data da citação, independentemente da data da parcela.">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                            <circle cx="12" cy="12" r="10"/>
                            <line x1="12" y1="8" x2="12" y2="8" stroke-width="3"/>
                            <line x1="12" y1="12" x2="12" y2="17"/>
                        </svg>
                    </span>
                </label>

                <div class="opcoes-emenda">

                    <label class="opcao-chip">
                        <input type="radio"
                               th:field="*{tipoRegraJuros}"
                               value="ACOMPANHA_PARCELA">

                        <span>
                            Período variável
                        </span>
                    </label>

                    <label class="opcao-chip">
                        <input type="radio"
                               th:field="*{tipoRegraJuros}"
                               value="CONGELADO_CITACAO">

                        <span>
                            Período fixo
                        </span>
                    </label>
                </div>
            </div>
        </div>

        <!-- ================= DADOS DAS PARCELAS ================= -->
        <div class="card-secao">

            <h5>
                <svg class="icone-secao" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="12" y1="1" x2="12" y2="23"/>
                    <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
                </svg>
                Dados das Parcelas
            </h5>

            <div id="parcelas-container">

                <div class="linha-parcela grid grid-3"
                     th:each="parcela, stat : *{parcelas}"
                     th:data-index="${stat.index}">

                    <div class="campo">
                        <label class="form-label"
                               th:style="${stat.index > 0} ? 'visibility:hidden' : ''">
                            Data da Parcela
                        </label>

                        <input type="text"
                               class="form-control mask-data data-parcela"
                               placeholder="dd/mm/aaaa"
                               th:field="*{parcelas[__${stat.index}__].dataParcela}">

                        <span class="text-danger"
                              th:if="${#fields.hasErrors('parcelas[' + stat.index + '].dataParcela')}"
                              th:errors="*{parcelas[__${stat.index}__].dataParcela}">
                        </span>
                    </div>

                    <div class="campo">
                        <label class="form-label"
                               th:style="${stat.index > 0} ? 'visibility:hidden' : ''">
                            Valor da Parcela (R$)
                        </label>

                        <div class="input-prefixo">
                            <span>R$</span>
                            <input type="text"
                                   class="form-control mask-moeda valor-parcela"
                                   th:field="*{parcelas[__${stat.index}__].valorParcela}">
                        </div>

                        <span class="text-danger"
                              th:if="${#fields.hasErrors('parcelas[' + stat.index + '].valorParcela')}"
                              th:errors="*{parcelas[__${stat.index}__].valorParcela}">
                        </span>
                    </div>

                    <div class="campo campo-botao-parcela">
                        <label class="form-label"
                               th:style="${stat.index > 0} ? 'visibility:hidden' : ''">
                            &nbsp;
                        </label>

                        <button type="button"
                                class="btn btn-adicionar"
                                id="btn-adicionar-parcela"
                                th:if="${stat.index == 0}"
                                title="Adicionar parcela">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                                <circle cx="12" cy="12" r="10"/>
                                <line x1="12" y1="8" x2="12" y2="16"/>
                                <line x1="8" y1="12" x2="16" y2="12"/>
                            </svg>
                        </button>

                        <button type="button"
                                class="btn btn-remover btn-remover-parcela"
                                th:if="${stat.index > 0}"
                                title="Remover parcela">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                                <polyline points="3 6 5 6 21 6"/>
                                <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
                                <path d="M10 11v6"/>
                                <path d="M14 11v6"/>
                                <path d="M9 6V4h6v2"/>
                            </svg>
                        </button>
                    </div>

                </div>

            </div>
        </div>


                    <!-- ================= AÇÕES ================= -->
        <div class="barra-acoes">
            <button type="submit" class="btn btn-destaque" id="btn-calcular">
                <span class="btn-texto">Calcular</span>
                <span class="spinner" hidden></span>
            </button>
        </div>

    </form>
</div>

<footer class="rodape-sistema">
    <span>© 2026 Sistema de Cálculos Judiciais • PGE-MS • PCS • UCALC</span>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/form.js}"></script>
</body>
</html>
